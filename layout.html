<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <style>
        body {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/static/background.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .navbar-custom {
            background-color: rgba(53, 141, 95, 0.85);
            transition: 0.3s;
        }
        .navbar-custom a.nav-link {
            color: #fff;
            transition: 0.2s;
        }
        .navbar-custom a.nav-link:hover {
            color: #ffc107;
            font-weight: bold;
        }
        .navbar-custom .navbar-brand {
            font-weight: bold;
            color: #fff;
        }

        .container-card {
            background-color: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            margin-top: 100px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .container-card:hover {
            transform: scale(1.02);
        }

        .table thead {
            background: linear-gradient(to right, #358d5f, #4caf50);
            color: #fff;
        }
        .table-hover tbody tr:hover {
            background-color: rgba(53,141,95,0.2);
        }

        .btn-custom {
            background-color: #358d5f;
            color: #fff;
            transition: 0.3s;
        }
        .btn-custom:hover {
            background-color: #4caf50;
            color: #fff;
        }

        .card-section {
            border-left: 5px solid #358d5f;
            padding-left: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container-card {
                margin-top: 70px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom fixed-top shadow">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Student System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/register"><i class="bi bi-pencil-square"></i> Register</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin"><i class="bi bi-speedometer2"></i> Admin</a></li>
                <li class="nav-item"><a class="nav-link" href="/students"><i class="bi bi-people"></i> Students</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container container-card">
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
